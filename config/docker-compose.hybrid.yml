services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "11443:11434"
      - "11444:11435"
    environment:
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - .:/usr/share/caddy
      - caddy_data:/data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  caddy_data:
