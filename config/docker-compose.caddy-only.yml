services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "11443:11434"
      - "11444:11435"
    environment:
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - .:/usr/share/caddy
      - caddy_data:/data

volumes:
  caddy_data:
